<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Mis XV Fátima Gabriela</title>

  <!-- SEO básico -->
  <meta name="title" content="Mis XV Fátima Gabriela">
  <meta name="description" content="Estás invitado a celebrar los XV años de Fátima Gabriela.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Mis XV Fátima Gabriela">
  <meta property="og:description" content="Estás invitado a celebrar los XV años de Fátima Gabriela.">
  <meta property="og:image" content="https://i.postimg.cc/DfcGkW8D/XVFG1.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://misquincefatima.thetwodesign.com/">

  <link rel="icon" href="https://i.postimg.cc/DfcGkW8D/XVFG1.jpg" type="image/png">

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arapey:ital@0;1&family=Cormorant+Garamond:ital@0;1&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      --verde: #97a36b;
      --verde-oscuro: #6f7b4e;
      --dorado: #b99841;
      --crema: #f9f5ef;
      --marfil: #fffaf3;
      --texto: #4b463f;
      --degradado-texto: linear-gradient(180deg, #eef9d8 0%, #a9cf7a 42%, #6f9f52 72%, #4f7a39 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Arapey", serif;
      color: var(--texto);
      background:
        linear-gradient(rgba(249, 245, 239, 0.45), rgba(249, 245, 239, 0.45)),
        url("/fondoverde.jpg") center/cover no-repeat,
        radial-gradient(circle at top left, rgba(151, 163, 107, 0.22), transparent 35%),
        radial-gradient(circle at bottom right, rgba(185, 152, 65, 0.18), transparent 35%),
        var(--crema);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 250, 243, 0.94);
      border: 1px solid rgba(185, 152, 65, 0.45);
      border-radius: 28px;
      padding: 42px 28px 34px;
      box-shadow: 0 18px 45px rgba(75, 70, 63, 0.12);
      position: relative;
      overflow: hidden;
    }

    .subtitulo {
      font-family: "Great Vibes", cursive;
      font-size: 30px;
      letter-spacing: 3px;
      margin-bottom: 10px;
      background: var(--degradado-texto);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }

    .nombres {
      margin: 0 0 18px;
      white-space: nowrap;
    }

    h1,
    h2 {
      font-family: "Great Vibes", cursive;
      font-weight: 400;
      line-height: 1;
      background: var(--degradado-texto);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 10px rgba(131, 214, 163, 0.22);
      display: inline-block;
      vertical-align: top;
    }

    h1 {
      font-size: 48px;
      margin: 0;
      padding: 5px;
    }

    h2 {
      font-size: 48px;
      margin: 0;
      line-height: 1.05;
      padding: 5px;
    }

    .fecha {
      font-family: "Cormorant Garamond", serif;
      font-size: 26px;
      margin-bottom: 26px;
      font-style: italic;
      background: var(--degradado-texto);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }

    .divider {
      width: 72px;
      height: 1px;
      background: var(--dorado);
      margin: 0 auto 26px;
    }

    .texto {
      font-size: 1.13rem;
      line-height: 1.45;
      margin: 0 auto 28px;
      max-width: 320px;
      color: #71864c;
    }

    .acciones {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .boton {
      display: block;
      text-decoration: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1.18rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.25s ease;
    }

    .boton-principal {
      background-color: #71864c;
      color: white;
      border: 1px solid #71864c;
      box-shadow: 0 8px 20px rgba(151, 163, 107, 0.28);
    }

    .boton-secundario {
      background: rgba(255, 255, 255, 0.7);
      color: #71864c;
      border: 1px solid #71864c;
    }

    .boton:hover {
      transform: translateY(-2px);
      filter: brightness(0.98);
    }

    .pases {
      margin-top: 22px;
      font-size: 1rem;
      color: var(--verde-oscuro);
      letter-spacing: 1px;
    }

    .firma {
      margin-top: 26px;
      font-size: 0.95rem;
      color: rgba(75, 70, 63, 0.7);
    }

    .firma a {
      color: inherit;
      text-decoration: none;
    }

    .firma a:hover {
      text-decoration: underline;
    }

    .flor-loto {
      display: block;
      width: 100%;
      max-width: 110px;
      margin: 18px auto 0;
      mix-blend-mode: multiply;
    }

    @media (max-width: 380px) {
      .card {
        padding: 38px 22px 30px;
      }

      h1 {
        font-size: 3.6rem;
      }

      h2 {
        font-size: 2.8rem;
      }
    }
  </style>
  <script src="/event-config.js?v=20260715-1"></script>
  <script src="/event-access.js?v=20260715-1"></script>
</head>

<body>

  <main class="card">
    <div class="subtitulo">Mis Quince</div>

    <div class="nombres">
      <h1>Fátima</h1>
      <h2>Gabriela</h2>
    </div>

    <div class="fecha">18 de julio 2026</div>

    <div class="divider"></div>

    <p class="texto">
      Hay momentos inolvidables que se atesoran en el corazón para siempre.
      Queremos compartir contigo esta celebración tan especial.
    </p>

    <div class="acciones">
      <a
        class="boton boton-principal"
        id="verInvitacion"
        href="#"
        target="_blank"
        rel="noopener noreferrer">
        Ver invitación PDF
      </a>

      <a
        class="boton boton-secundario"
        id="confirmarAsistencia"
        href="#"
        target="_blank"
        rel="noopener noreferrer">
        Confirmar asistencia
      </a>
    </div>

    <div class="pases" id="textoPases"></div>

    <div class="firma">
      <a href="https://www.thetwodesign.com" target="_blank" rel="noopener noreferrer">www.thetwodesign.com</a>
    </div>

    <img class="flor-loto" src="/flordeloto.jpg" alt="Flor de loto">
  </main>

  <script>
    const EVENT_ID = (window.EVENT_REMOTE_CONFIG && window.EVENT_REMOTE_CONFIG.eventId) || "misxvfatimapdf";

    async function initPage() {
      const status = await window.EventAccess.enforcePublicAccess({
        eventId: EVENT_ID,
        inactiveMessage: "Invitacion no disponible, el acceso ha sido suspendido y el servicio pausado. Comunicate con tu proveedor para reactivarlo."
      });

      if (status.isActive === false) {
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const pases = parseInt(params.get("pases"), 10) || 1;
      const versionActual = "20260714-1";
      const archivos = {
        1: "1.pdf",
        2: "2.pdf",
        3: "3.pdf",
        4: "4.pdf",
        5: "5.pdf"
      };

      const archivoPdf = archivos[pases] || archivos[1];
      document.getElementById("verInvitacion").href =
        `viewer.html?file=${encodeURIComponent(archivoPdf)}&v=${encodeURIComponent(versionActual)}`;

      document.getElementById("textoPases").textContent =
        pases === 1
          ? "Hemos reservado para ti 1 pase"
          : `Hemos reservado para ti ${pases} pases`;

      let mensaje;

      if (pases === 1) {
        mensaje =
          "Hola, confirmo mi asistencia a los quince años de Fátima. Asistiré con 1 lugar reservado. Muchas gracias por la invitación. Nos vemos pronto.";
      } else {
        mensaje =
          `Hola, confirmamos nuestra asistencia a los quince años de Fátima. Asistiremos con ${pases} lugares reservados. Muchas gracias por la invitación. Nos vemos pronto.`;
      }

      document.getElementById("confirmarAsistencia").href =
        `https://api.whatsapp.com/send/?phone=50236738591&text=${encodeURIComponent(mensaje)}&type=phone_number&app_absent=0&wame_ctl=1`;
    }

    initPage();
  </script>

</body>
</html>
