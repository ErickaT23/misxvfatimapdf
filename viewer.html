<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Invitacion XV Fatima Gabriela</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Arapey", serif;
      color: #4b463f;
      background:
        linear-gradient(rgba(249, 245, 239, 0.35), rgba(249, 245, 239, 0.35)),
        url("/fondoverde.jpg") center/cover no-repeat,
        #f9f5ef;
      padding: 24px 16px;
    }

    .contenedor {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    .marco-pdf {
      background: rgba(255, 250, 243, 0.94);
      border: 1px solid rgba(185, 152, 65, 0.35);
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 18px 45px rgba(75, 70, 63, 0.1);
    }

    .estado {
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #71864c;
      font-size: 1.1rem;
      padding: 20px;
    }

    .paginas {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .pagina {
      width: 100%;
      display: block;
      border-radius: 16px;
      background: white;
      box-shadow: 0 10px 24px rgba(75, 70, 63, 0.08);
    }

    @media (max-width: 680px) {
      body {
        padding: 16px 10px;
      }
    }
  </style>
</head>
<body>
  <main class="contenedor">
    <section class="marco-pdf">
      <div class="estado" id="estadoPdf">Cargando invitacion...</div>
      <div class="paginas" id="paginasPdf" hidden></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const archivo = params.get("file") || "1.pdf";
    const version = params.get("v") || Date.now();
    const permitidos = new Set(["1.pdf", "2.pdf", "3.pdf", "4.pdf", "5.pdf"]);
    const archivoSeguro = permitidos.has(archivo) ? archivo : "1.pdf";
    const pdfUrl = `${archivoSeguro}?v=${encodeURIComponent(version)}`;
    const estadoPdf = document.getElementById("estadoPdf");
    const paginasPdf = document.getElementById("paginasPdf");

    async function cargarPdf() {
      try {
        const pdfjsLib = await import("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs");
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.mjs";

        const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
        const anchoContenedor = paginasPdf.clientWidth || paginasPdf.parentElement.clientWidth;

        for (let numeroPagina = 1; numeroPagina <= pdf.numPages; numeroPagina += 1) {
          const pagina = await pdf.getPage(numeroPagina);
          const viewportBase = pagina.getViewport({ scale: 1 });
          const escala = anchoContenedor / viewportBase.width;
          const viewport = pagina.getViewport({ scale: Math.max(escala, 0.1) });
          const canvas = document.createElement("canvas");
          const contexto = canvas.getContext("2d");

          canvas.className = "pagina";
          canvas.width = Math.floor(viewport.width * window.devicePixelRatio);
          canvas.height = Math.floor(viewport.height * window.devicePixelRatio);
          canvas.style.width = `${Math.floor(viewport.width)}px`;
          canvas.style.height = `${Math.floor(viewport.height)}px`;

          contexto.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);

          await pagina.render({
            canvasContext: contexto,
            viewport
          }).promise;

          paginasPdf.appendChild(canvas);
        }

        estadoPdf.hidden = true;
        paginasPdf.hidden = false;
      } catch (error) {
        estadoPdf.textContent = "No se pudo cargar la invitacion.";
      }
    }

    cargarPdf();
  </script>
</body>
</html>
