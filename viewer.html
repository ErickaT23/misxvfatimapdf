<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitacion PDF</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f9f5ef;
      font-family: Arial, sans-serif;
    }

    .visor {
      width: 100%;
      height: 100vh;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <iframe class="visor" id="visorPdf" title="Invitacion PDF"></iframe>

  <script>
    const params = new URLSearchParams(window.location.search);
    const archivo = params.get("file") || "1.pdf";
    const permitidos = new Set(["1.pdf", "2.pdf", "3.pdf", "4.pdf", "5.pdf"]);

    document.getElementById("visorPdf").src = permitidos.has(archivo) ? archivo : "1.pdf";
  </script>
</body>
</html>
