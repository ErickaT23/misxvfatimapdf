<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Admin | Mis XV Fatima Gabriela</title>
  <style>
    :root {
      --verde: #97a36b;
      --verde-oscuro: #6f7b4e;
      --dorado: #b99841;
      --crema: #f9f5ef;
      --texto: #4b463f;
      --rojo: #8d4d4d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Arapey", serif;
      color: var(--texto);
      background:
        linear-gradient(rgba(249, 245, 239, 0.45), rgba(249, 245, 239, 0.45)),
        url("/fondoverde.jpg") center/cover no-repeat,
        var(--crema);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .panel {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 250, 243, 0.96);
      border: 1px solid rgba(185, 152, 65, 0.45);
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 18px 45px rgba(75, 70, 63, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
      color: var(--verde-oscuro);
      text-align: center;
    }

    .descripcion,
    .estado,
    .mensaje {
      text-align: center;
      line-height: 1.45;
    }

    .descripcion {
      margin: 0 0 22px;
      color: #6f7b4e;
      font-size: 1.05rem;
    }

    .estado {
      margin: 0 0 18px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(151, 163, 107, 0.12);
      color: var(--verde-oscuro);
      font-size: 1.1rem;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    input {
      width: 100%;
      border: 1px solid rgba(111, 123, 78, 0.35);
      border-radius: 14px;
      padding: 14px 16px;
      font: inherit;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.85);
      margin-bottom: 16px;
    }

    .acciones {
      display: grid;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font: inherit;
      font-size: 1.05rem;
      cursor: pointer;
    }

    .activar {
      background: #71864c;
      color: #fff;
    }

    .desactivar {
      background: #efe5d3;
      color: var(--rojo);
      border: 1px solid rgba(141, 77, 77, 0.22);
    }

    .mensaje {
      min-height: 28px;
      margin: 16px 0 0;
      color: var(--rojo);
    }

    .sesion {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .oculto {
      display: none;
    }

    .secundario {
      background: rgba(255, 255, 255, 0.7);
      color: var(--verde-oscuro);
      border: 1px solid rgba(111, 123, 78, 0.22);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Admin del evento</h1>
    <p class="descripcion">Activa o desactiva esta invitacion sin borrar el evento.</p>
    <div class="estado" id="estadoActual">Consultando estado actual...</div>

    <div class="sesion" id="loginPanel">
      <div>
        <label for="adminEmail">Correo administrador</label>
        <input id="adminEmail" type="email" autocomplete="username" placeholder="admin@correo.com" />
      </div>

      <div>
        <label for="adminPassword">Contrasena</label>
        <input id="adminPassword" type="password" autocomplete="current-password" placeholder="Ingresa la contrasena" />
      </div>

      <button class="secundario" id="loginBtn" type="button">Ingresar</button>
    </div>

    <div class="acciones oculto" id="accionesPanel">
      <button class="activar" id="activarBtn" type="button">Activar invitacion</button>
      <button class="desactivar" id="desactivarBtn" type="button">Desactivar invitacion</button>
      <button class="secundario" id="logoutBtn" type="button">Cerrar sesion</button>
    </div>

    <p class="mensaje" id="mensajeAdmin"></p>
  </main>

  <script src="/event-config.js?v=20260715-1"></script>
  <script src="/event-access.js?v=20260715-1"></script>
  <script>
    const estadoActual = document.getElementById("estadoActual");
    const mensajeAdmin = document.getElementById("mensajeAdmin");
    const adminEmailInput = document.getElementById("adminEmail");
    const adminPasswordInput = document.getElementById("adminPassword");
    const activarBtn = document.getElementById("activarBtn");
    const desactivarBtn = document.getElementById("desactivarBtn");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginPanel = document.getElementById("loginPanel");
    const accionesPanel = document.getElementById("accionesPanel");
    const remoteConfig = window.EventAccess.getRemoteConfig();
    const EVENT_ID = remoteConfig.eventId;

    function setLoadingState(isLoading) {
      activarBtn.disabled = isLoading;
      desactivarBtn.disabled = isLoading;
      loginBtn.disabled = isLoading;
      logoutBtn.disabled = isLoading;
      activarBtn.style.opacity = isLoading ? "0.7" : "1";
      desactivarBtn.style.opacity = isLoading ? "0.7" : "1";
    }

    function renderAuthState(isLoggedIn) {
      loginPanel.classList.toggle("oculto", isLoggedIn);
      accionesPanel.classList.toggle("oculto", !isLoggedIn);
    }

    function renderStatus(isActive) {
      estadoActual.textContent = isActive
        ? "Estado actual: invitacion activa"
        : "Estado actual: invitacion inactiva";
    }

    async function refreshStatus() {
      mensajeAdmin.textContent = "";

      if (!window.EventAccess.hasRemoteConfig()) {
        estadoActual.textContent = "Falta configurar event-config.js con Firebase.";
        return;
      }

      try {
        const status = await window.EventAccess.fetchStatus(EVENT_ID);
        renderStatus(status.isActive !== false);
      } catch (error) {
        estadoActual.textContent = "No se pudo consultar el estado remoto.";
      }
    }

    async function updateStatus(isActive) {
      setLoadingState(true);
      mensajeAdmin.textContent = "Guardando cambio...";

      try {
        const payload = await window.EventAccess.updateStatus(isActive);

        renderStatus(payload.isActive !== false);
        mensajeAdmin.textContent = payload.isActive === false
          ? "Invitacion desactivada correctamente."
          : "Invitacion activada correctamente.";
      } catch (error) {
        mensajeAdmin.textContent = error.message;
      } finally {
        setLoadingState(false);
      }
    }

    async function login() {
      const email = adminEmailInput.value.trim();
      const password = adminPasswordInput.value;

      if (!email || !password) {
        mensajeAdmin.textContent = "Ingresa correo y contrasena.";
        return;
      }

      setLoadingState(true);
      mensajeAdmin.textContent = "Ingresando...";

      try {
        await window.EventAccess.signInAdmin(email, password);
        mensajeAdmin.textContent = "Sesion iniciada.";
      } catch (error) {
        mensajeAdmin.textContent = "No se pudo iniciar sesion.";
      } finally {
        setLoadingState(false);
      }
    }

    async function logout() {
      setLoadingState(true);

      try {
        await window.EventAccess.signOutAdmin();
        mensajeAdmin.textContent = "Sesion cerrada.";
      } finally {
        setLoadingState(false);
      }
    }

    activarBtn.addEventListener("click", function () {
      updateStatus(true);
    });

    desactivarBtn.addEventListener("click", function () {
      updateStatus(false);
    });

    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);

    window.EventAccess.waitForAuthState(function (user) {
      renderAuthState(Boolean(user));
      refreshStatus();
    });

    renderAuthState(false);
  </script>
</body>
</html>
